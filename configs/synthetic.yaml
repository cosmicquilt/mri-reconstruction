# fast end-to-end run on synthetic data no download cpu-friendly
# verify the full torch training/eval path in a couple minutes before a long fastmri run
#   python -m mri_recon.cli train --config configs/synthetic.yaml
seed: 42
device: auto

mask:
  type: random
  center_fractions: [0.08]
  accelerations: [4]

data:
  source: synthetic
  crop: [256, 256]
  synthetic_shape: [256, 256]
  train_size: 64
  val_size: 16

model:
  name: unet
  unet: {in_chans: 1, out_chans: 1, chans: 16, num_pool_layers: 3, drop_prob: 0.0}
  unrolled: {num_cascades: 3, chans: 16, n_convs: 5, shared_weights: false, learnable_dc: true, init_v: 0.95}

train:
  epochs: 5
  batch_size: 8
  lr: 0.001
  weight_decay: 0.0
  loss: l1
  num_workers: 0

eval:
  batch_size: 8
  methods: [zero_filled, unet]
  accelerations: [4, 8]
  center_fractions: [0.08, 0.04]
  plot_metric: ssim

output:
  dir: results/synthetic
